# fly.toml - ClipAI Downloader Service
app = "yt-downloader-t3w4ug"
primary_region = "lhr"  # London - closest to Railway's EU servers

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

# NET_ADMIN is required for WireGuard (WARP)
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[mounts]]
  source = "warp_config"
  destination = "/config"

[[metrics]]
  port = 9091
  path = "/metrics"
