# fly.toml app configuration file generated for yt-downloader-t3w4ug on 2026-04-25T19:44:06Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yt-downloader-t3w4ug'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'


[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[metrics]]
  port = 9091
  path = '/metrics'
