http_port 8080

# Route all traffic through the WARP wireguard interface
tcp_outgoing_address 0.0.0.0

# Allow all connections (internal service only)
acl all src all
http_access allow all

# Performance tuning
cache deny all
access_log none
cache_log /dev/null

# Use WARP interface for outbound traffic
acl warp_traffic dst all
tcp_outgoing_address 0.0.0.0 warp_traffic
